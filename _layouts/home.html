<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" href="{{ '/favicon/favicon.ico' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>
{% include theme-toggle.html %}
<main class="page">
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"></button>
  {{ content }}
</main>
<script>
(function() {
  var t = document.getElementById('theme-toggle');
  var h = document.documentElement;
  function update() { t.textContent = h.classList.contains('dark') ? '○' : '●'; }
  update();
  t.addEventListener('click', function() {
    h.classList.toggle('dark');
    localStorage.setItem('theme', h.classList.contains('dark') ? 'dark' : 'light');
    update();
  });
})();
</script>
<script>
(function() {
  var strip = document.querySelector('.photo-strip');
  if (!strip) return;
  var inner = strip.querySelector('.photo-strip-inner');

  // duplicate images for seamless loop
  inner.innerHTML += inner.innerHTML;
  var setWidth = inner.scrollWidth / 2;

  var pos = 0;
  var speed = 0.3;
  var dragging = false;
  var startX = 0;
  var startPos = 0;

  function wrap() {
    if (pos < 0) pos += setWidth;
    if (pos >= setWidth) pos -= setWidth;
  }

  function render() {
    wrap();
    inner.style.transform = 'translateX(' + (-pos) + 'px)';
  }

  // auto-scroll
  var raf;
  function tick() {
    if (!dragging) { pos += speed; render(); }
    raf = requestAnimationFrame(tick);
  }
  raf = requestAnimationFrame(tick);

  // drag
  strip.addEventListener('mousedown', function(e) {
    dragging = true;
    startX = e.clientX;
    startPos = pos;
    strip.classList.add('grabbing');
  });
  window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    pos = startPos - (e.clientX - startX);
    render();
  });
  window.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    strip.classList.remove('grabbing');
  });

  // touch
  strip.addEventListener('touchstart', function(e) {
    dragging = true;
    startX = e.touches[0].clientX;
    startPos = pos;
  }, { passive: true });
  strip.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    pos = startPos - (e.touches[0].clientX - startX);
    render();
  }, { passive: true });
  strip.addEventListener('touchend', function() { dragging = false; });
})();
</script>
</body>
</html>
