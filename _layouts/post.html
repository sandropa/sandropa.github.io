<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: page.title | strip_html | truncate: 160 }}">
  <link rel="icon" href="{{ '/favicon/favicon.ico' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% if page.math %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  {% endif %}
</head>
<body>
{% include theme-toggle.html %}
<main class="page">
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"></button>
  <a href="{{ '/' | relative_url }}" class="home-link">Sandro Paradžik</a>

  <article>
    <h1>{{ page.title }}</h1>
    <time>{{ page.date | date: "%B %-d, %Y" }}</time>
    {{ content }}
  </article>
</main>

{% if page.math %}
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body);"></script>
{% endif %}
<script>
(function() {
  var t = document.getElementById('theme-toggle');
  var h = document.documentElement;
  function update() { t.textContent = h.classList.contains('dark') ? '○' : '●'; }
  update();
  t.addEventListener('click', function() {
    h.classList.toggle('dark');
    localStorage.setItem('theme', h.classList.contains('dark') ? 'dark' : 'light');
    update();
  });
})();
</script>
</body>
</html>
