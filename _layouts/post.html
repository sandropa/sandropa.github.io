<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: page.title | strip_html | truncate: 160 }}">
  <link rel="icon" href="{{ '/favicon/favicon.ico' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% if page.math %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  {% endif %}
</head>
<body class="post-page">
<div class="page">

<header class="masthead post-masthead">
  <div class="id-block">
    <a href="{{ '/' | relative_url }}" class="mark-link">{% include mark.svg %}</a>
    <a href="{{ '/' | relative_url }}" class="name">sandro paradžik</a>
  </div>
  <nav>
    <a href="{{ '/' | relative_url }}">home</a>
    <a href="mailto:{{ site.author.email }}">email</a>
    <a href="https://github.com/{{ site.author.github }}">github</a>
  </nav>
</header>

<article>
  <div class="post-meta">{{ page.date | date: "%Y · %m · %d" }} · writing</div>
  <h1 class="post-title">{{ page.title }}</h1>

  {{ content }}

  <a href="{{ '/' | relative_url }}" class="back-link">back home</a>
</article>

<div class="footer">
  <span>./sandropa.github.io</span>
  <span>{{ 'now' | date: '%Y' }}</span>
</div>

</div>

{% if page.math %}
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body);"></script>
{% endif %}
</body>
</html>
