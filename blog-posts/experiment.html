<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Blog Post</title>
    <link rel="icon" type="image/x-icon" href="/../images/favicon.ico">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.25.2.min.js"></script>
    <style>
        #slider-container {
            width: 80%;
            margin: 20px auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Plotly Chart -->
        <div id="plot" class="border border-dark" style="max-width: 100%; height: 80vh; overflow: hidden;"></div>

        <!-- Slider for adjusting frequency -->
        <div id="slider-container">
            <label for="frequency-slider">Frequency: </label>
            <input type="range" id="frequency-slider" min="1" max="20" step="0.1" value="1">
            <span id="frequency-value">1</span>
        </div>
    </div>

    <script>
        // Initial data for 3D plot
        let x = [];
        let y = [];
        let z = [];
        let frequency = 1;  // Default frequency for sine wave

        // Generate initial data for sine wave
        function generateData(frequency) {
            x = [];  // Reset x values
            y = [];  // Reset y values
            z = [];  // Reset z values
            for (let i = 0; i < 100; i++) {
                x.push(i * 0.1);
                y.push(Math.sin(i * 0.1 * frequency));  // Sine wave with adjustable frequency
                z.push(Math.cos(i * 0.1));  // Z follows a cosine wave
            }
        }

        // Plotly chart update function
        function updatePlot(frequency) {
            // Clear previous x values and regenerate data
            x.length = 0;
            z.length = 0;

            generateData(frequency);

            // Define the line trace
            const trace = {
                x: x,
                y: y,
                z: z,
                type: 'scatter3d',
                mode: 'lines',
                line: {
                    width: 4
                }
            };

            // Define the layout
            const layout = {
                title: '3D Line Plot with Adjustable Frequency',
                scene: {
                    xaxis: { title: 'X-axis' },
                    yaxis: { title: 'Y-axis' },
                    zaxis: { title: 'Z-axis' }
                }
            };

            // Update the plot with new data
            Plotly.react('plot', [trace], layout);
        }

        // Initial plot
        updatePlot(frequency);

        // Event listener for slider
        document.getElementById('frequency-slider').addEventListener('input', function (event) {
            frequency = parseFloat(event.target.value);  // Get slider value and ensure it's a number
            document.getElementById('frequency-value').textContent = frequency; // Update displayed frequency
            updatePlot(frequency);  // Update the plot with new frequency
        });
    </script>
</body>
</html>
